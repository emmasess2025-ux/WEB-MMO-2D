<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Cancelado - Argems</title>
    <style>
        body { 
            background: #1e272e; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
        }
        h1 { color: #ff5e57; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #d2dae2; font-size: 1.2rem; max-width: 400px; line-height: 1.5; }
        button {
            background: #ff5e57;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #ff3f34; }
    </style>
</head>
<body>
    <h1>Pago Cancelado ❌</h1>
    <p>No se ha realizado ningún cargo a tu tarjeta. Puedes cerrar esta ventana y seguir jugando.</p>
    <button onclick="window.close()">Cerrar Ventana</button>
    <script>
        // Intentar cerrar la ventana automáticamente después de 4 segundos
        setTimeout(() => {
            window.close();
        }, 4000);
    </script>
</body>
</html>
